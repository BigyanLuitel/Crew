research_task:
  description: >
    Conduct a thorough research on company {company}, Focus on:
    1. Current Company Status and health
    2. Historical company performance
    3. Major Challenges and Opportunities
    4. Recent news and events
    5. Future outlook and potential developments

    Make sure to organize your findings in a structured format, with clear sections.
  expected_output: >
    A comprehensive research document with well-organized sections covering all the requested aspects of {company}. The document should be detailed and provide a clear understanding of the company's current status, historical performance, challenges, opportunities, recent news, and future outlook.
  agent: researcher

analysis_task:
  description: >
   Analyze the research findings and create a comprehensive report on {company}.
   Your report should include:
   1. Begin with an executive summary.
   2. Include all key information frim the research.
   3. provide insights and analysis based on the research findings.
   4. offer a market lookout for company, noting that this should not be used for trading decisions but rather for informational purposes.
   5. Be formatted in a professional, easy-to-read style with clear headings.
  expected_output: >
   A polished and professional report that synthesizes the research findings into a clear and insightful document. The report should include an executive summary, detailed analysis, insights, and a market outlook for {company}. It should be well-structured with clear headings and presented in a format suitable for stakeholders to understand the company's position and potential future developments.
   Note: The market outlook should be informative and not used for trading decisions.```'
  agent: analyst
  context:
  - research_task